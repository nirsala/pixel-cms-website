    <style>
        .blog-hero {
            padding: 140px 20px 80px;
            text-align: center;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 100%);
            border-bottom: 1px solid rgba(255,255,255,.07);
        }
        .blog-hero h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 16px;
            color: #fff;
        }
        .blog-hero p {
            color: rgba(255,255,255,.6);
            font-size: 1.15rem;
            max-width: 680px;
            margin: 0 auto;
        }
        .blog-hero .blog-tag {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(215,29,67,.1);
            border: 1px solid rgba(215,29,67,.3);
            border-radius: 20px;
            color: #d71d43;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .blog-grid {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
        }
        .blog-card {
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .blog-card:hover {
            border-color: rgba(215,29,67,.4);
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(215,29,67,.15);
        }
        .blog-card-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }
        .blog-card-body {
            padding: 28px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .blog-card-tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(215,29,67,.12);
            color: #d71d43;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-radius: 12px;
            margin-bottom: 14px;
            align-self: flex-start;
        }
        .blog-card h2 {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 12px;
            line-height: 1.4;
            color: #fff;
        }
        .blog-card h2 a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }
        .blog-card h2 a:hover { color: #d71d43; }
        .blog-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 18px;
            margin-top: auto;
            border-top: 1px solid rgba(255,255,255,.06);
            font-size: 12px;
            color: rgba(255,255,255,.4);
        }
        .blog-card-read {
            color: #d71d43;
            font-weight: 700;
            text-decoration: none;
        }
        .blog-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: rgba(255,255,255,.5);
        }
        .blog-empty svg {
            width: 64px;
            height: 64px;
            opacity: 0.3;
            margin-bottom: 20px;
        }
        .blog-empty h3 {
            font-size: 1.5rem;
            color: rgba(255,255,255,.7);
            margin-bottom: 10px;
        }
        @media (max-width: 768px) {

    <script>
        const UNSPLASH = {
            'led': 'https://images.unsplash.com/photo-1560472354-b33ff0c44a43?auto=format&fit=crop&w=1200&q=85',
            'ויטרינה': 'https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?auto=format&fit=crop&w=1200&q=85',
            'מסעדה': 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1200&q=85',
            'חוצות': 'https://images.unsplash.com/photo-1542744173-8e7e53415bb0?auto=format&fit=crop&w=1200&q=85',
            'default': 'https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?auto=format&fit=crop&w=1200&q=85'
        };
        function pickImage(keyword) {
            const k = (keyword || '').toLowerCase();
            for (const key in UNSPLASH) {
                if (k.includes(key)) return UNSPLASH[key];
            }
            return UNSPLASH.default;
        }
        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }
        fetch('/blog/index.json')
            .then(r => r.ok ? r.json() : [])
            .then(articles => {
                const grid = document.getElementById('blogGrid');
                if (!articles || articles.length === 0) {
                    grid.innerHTML = `
                        <div class="blog-empty">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                                <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
                            </svg>
                            <h3>המאמרים בדרך</h3>
                            <p>אנחנו עובדים על תוכן איכותי — בקרוב כאן מאמרים חדשים בכל שבוע.</p>
                        </div>`;
                    return;
                }
                grid.innerHTML = articles.map(a => `
                    <article class="blog-card">
                        <a href="/blog/${escapeHtml(a.slug)}.html">
                            <img src="${pickImage(a.keyword)}" alt="${escapeHtml(a.title)}" class="blog-card-img" loading="lazy">
                        </a>
                        <div class="blog-card-body">
                            <span class="blog-card-tag">${escapeHtml(a.keyword || '')}</span>
                            <h2><a href="/blog/${escapeHtml(a.slug)}.html">${escapeHtml(a.title)}</a></h2>
                            <div class="blog-card-meta">
                                <span>${escapeHtml(a.date || '')}</span>
                                <a href="/blog/${escapeHtml(a.slug)}.html" class="blog-card-read">קרא עוד ←</a>
                            </div>
                        </div>
                    </article>
                `).join('');
            })
            .catch(() => {
                document.getElementById('blogLoading').innerHTML = '<h3>שגיאה בטעינת המאמרים</h3>';
            });
    </script>
